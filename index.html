<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Anthony</title>

<style>
body{
  margin:0;
  background:black;
  color:white;
  font-family:Arial;
  overflow:hidden;
}

/* INTRO */
#intro{
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:black;
  cursor:pointer;
  z-index:10;
}

#intro h1{
  font-size:20px;
  font-weight:300;
  letter-spacing:4px;
  opacity:0.8;
  animation:fade 2s infinite;
}

@keyframes fade{
  0%,100%{opacity:0.8;}
  50%{opacity:0.3;}
}

/* CONTENIDO */
.container{
  display:none;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  animation:fadeIn 1s ease;
}

@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
}

.nombre{
  font-size:22px;
  margin-bottom:40px;
  letter-spacing:2px;
}

/* BOTONES MINIMAL */
.btn{
  width:220px;
  padding:14px;
  margin:10px;
  text-align:center;
  text-decoration:none;
  color:white;
  border:1px solid #333;
  border-radius:10px;
  background:#0a0a0a;
  transition:0.3s;
}

.btn:hover{
  background:#111;
  transform:scale(1.03);
}
</style>
</head>

<body>

<div id="intro">
  <h1>CLICK TO ENTER</h1>
</div>

<div class="container" id="contenido">
  <div class="nombre">Anthony</div>

  <a class="btn" href="https://discord.gg/99HWbx9z" target="_blank">Discord</a>
  <a class="btn" href="https://tiktok.com/@el_patto.1" target="_blank">TikTok</a>
</div>

<script>
document.getElementById("intro").addEventListener("click", function(){
  this.style.display="none";
  document.getElementById("contenido").style.display="flex";
});
</script>

</body>
</html>
