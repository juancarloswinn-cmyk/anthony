<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Anthony</title>

<style>
body{
  margin:0;
  background:black;
  color:white;
  font-family:Arial;
  overflow:hidden;
}

/* FONDO CON BLUR */
body::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:radial-gradient(circle at center, #111, black);
  filter:blur(20px);
  z-index:-1;
}

/* INTRO */
#intro{
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:black;
  cursor:pointer;
  z-index:10;
}

#intro h1{
  font-size:18px;
  letter-spacing:5px;
  color:white;
  opacity:0.7;
  animation:fade 2s infinite;
}

@keyframes fade{
  0%,100%{opacity:0.7;}
  50%{opacity:0.2;}
}

/* CONTENIDO */
.container{
  display:none;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  animation:fadeIn 1s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

/* NOMBRE */
.nombre{
  font-size:24px;
  margin-bottom:40px;
  letter-spacing:3px;
  text-shadow:0 0 10px rgba(255,255,255,0.2);
}

/* BOTONES GLASS */
.btn{
  width:230px;
  padding:14px;
  margin:10px;
  text-align:center;
  text-decoration:none;
  color:white;
  border-radius:12px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  transition:0.3s;
}

.btn:hover{
  background:rgba(255,255,255,0.1);
  transform:scale(1.04);
  box-shadow:0 0 15px rgba(255,255,255,0.2);
}
</style>
</head>

<body>

<div id="intro">
  <h1>CLICK TO ENTER</h1>
</div>

<div class="container" id="contenido">
  <div class="nombre">Anthony</div>

  <a class="btn" href="https://discord.gg/99HWbx9z" target="_blank">Discord</a>
  <a class="btn" href="https://tiktok.com/@el_patto.1" target="_blank">TikTok</a>
</div>

<script>
document.getElementById("intro").addEventListener("click", function(){
  this.style.opacity="0";

  setTimeout(() => {
    this.style.display="none";
    document.getElementById("contenido").style.display="flex";
  }, 400);
});
</script>

</body>
</html>
