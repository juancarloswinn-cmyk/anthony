<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Anthony</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:Arial;
  color:white;
}

/* VIDEO DE FONDO */
video{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
}

/* OSCURECER VIDEO */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  z-index:-1;
}

/* CONTENIDO */
.container{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  animation:fadeIn 1s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

/* NOMBRE */
.logo{
  font-size:30px;
  margin-bottom:30px;
  letter-spacing:3px;
  text-shadow:0 0 20px rgba(255,255,255,0.5);
}

/* TARJETAS */
.cards{
  display:flex;
  gap:20px;
}

.card{
  width:200px;
  padding:20px;
  border-radius:20px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(15px);
  border:1px solid rgba(255,255,255,0.2);
  text-decoration:none;
  color:white;
  transition:0.3s;
  position:relative;
  overflow:hidden;
}

/* EFECTO BRILLO */
.card::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  left:-100%;
  top:0;
  background:linear-gradient(120deg, transparent, rgba(255,255,255,0.4), transparent);
  transition:0.6s;
}

.card:hover::before{
  left:100%;
}

.card:hover{
  transform:scale(1.08);
  box-shadow:0 0 25px rgba(255,255,255,0.3);
}
</style>
</head>

<body>

<!-- VIDEO -->
<video autoplay muted loop>
  <source src="video.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="container">
  <div class="logo">Anthony 😏</div>

  <div class="cards">
    <a class="card" href="https://discord.gg/99HWbx9z" target="_blank">
      💬 Discord
    </a>

    <a class="card" href="https://tiktok.com/@el_patto.1" target="_blank">
      🎵 TikTok
    </a>
  </div>
</div>

</body>
</html>
