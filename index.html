<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anthony</title>

<style>
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, Arial;
  color:white;
  overflow:hidden;
}

/* INTRO */
#intro{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  z-index:10;
  transition:opacity 0.4s ease;
}

#intro h1{
  letter-spacing:6px;
  font-size:22px;
  animation:parpadeo 1.5s infinite;
}

@keyframes parpadeo{
  0%,100%{opacity:1;}
  50%{opacity:0.3;}
}

/* VIDEO */
.video-bg{
  position:fixed;
  width:100%;
  height:100%;
  z-index:-2;
}

.video-bg video{
  width:100%;
  height:100%;
  object-fit:cover;
  animation:zoom 25s ease-in-out infinite alternate;
}

@keyframes zoom{
  from{transform:scale(1);}
  to{transform:scale(1.15);}
}

/* OVERLAY */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:linear-gradient(to bottom, rgba(0,0,0,0.4), rgba(0,0,0,0.8));
  z-index:-1;
}

/* CONTENIDO */
.container{
  height:100vh;
  display:none;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  animation:fadeIn 1s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(30px);}
  to{opacity:1; transform:translateY(0);}
}

/* LOGO */
.logo{
  font-size:34px;
  margin-bottom:40px;
  letter-spacing:3px;
  text-shadow:0 0 30px rgba(255,255,255,0.4);
}

/* TARJETAS */
.cards{
  display:grid;
  gap:20px;
  width:90%;
  max-width:300px;
}

.card{
  padding:18px;
  border-radius:18px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.15);
  text-decoration:none;
  color:white;
  position:relative;
  overflow:hidden;
  transition:0.4s;
}

/* BRILLO */
.card::before{
  content:"";
  position:absolute;
  top:0;
  left:-100%;
  width:100%;
  height:100%;
  background:linear-gradient(120deg, transparent, rgba(255,255,255,0.4), transparent);
  transition:0.6s;
}

.card:hover::before{
  left:100%;
}

.card:hover{
  transform:translateY(-5px) scale(1.03);
  box-shadow:0 10px 40px rgba(0,0,0,0.6);
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <h1>CLICK TO ENTER</h1>
</div>

<!-- VIDEO -->
<div class="video-bg">
  <video autoplay muted loop playsinline id="video">
    <source src="video.mp4" type="video/mp4">
  </video>
</div>

<div class="overlay"></div>

<!-- CONTENIDO -->
<div class="container" id="contenido">
  <div class="logo">Anthony 😏</div>

  <div class="cards">
    <a class="card" href="https://discord.gg/99HWbx9z" target="_blank">
      💬 Discord
    </a>

    <a class="card" href="https://tiktok.com/@el_patto.1" target="_blank">
      🎵 TikTok
    </a>
  </div>
</div>

<script>
// CLICK PARA ENTRAR + AUDIO
document.getElementById("intro").addEventListener("click", function(){
  this.style.opacity="0";

  setTimeout(()=>{
    this.style.display="none";
    document.getElementById("contenido").style.display="flex";
  },400);

  const video = document.getElementById("video");

  video.muted = false;
  video.volume = 1;

  video.play().catch(err => {
    console.log("Error al reproducir:", err);
  });
});
</script>

</body>
</html>
