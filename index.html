<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Anthony</title>

<style>
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, Arial;
  color:white;
  overflow:hidden;
}

/* VIDEO FONDO */
.video-bg{
  position:fixed;
  width:100%;
  height:100%;
  z-index:-2;
  overflow:hidden;
}

.video-bg video{
  width:100%;
  height:100%;
  object-fit:cover;
  animation:zoom 25s ease-in-out infinite alternate;
}

/* ZOOM SUAVE */
@keyframes zoom{
  from{transform:scale(1);}
  to{transform:scale(1.15);}
}

/* OVERLAY GRADIENTE */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:linear-gradient(to bottom, rgba(0,0,0,0.4), rgba(0,0,0,0.8));
  z-index:-1;
}

/* CONTENEDOR */
.container{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

/* LOGO */
.logo{
  font-size:34px;
  font-weight:600;
  margin-bottom:40px;
  letter-spacing:3px;
  text-shadow:0 0 30px rgba(255,255,255,0.4);
  animation:fadeDown 1s ease;
}

@keyframes fadeDown{
  from{opacity:0; transform:translateY(-40px);}
  to{opacity:1; transform:translateY(0);}
}

/* GRID TARJETAS */
.cards{
  display:grid;
  grid-template-columns:1fr;
  gap:20px;
  width:280px;
}

/* TARJETAS SHOPIFY */
.card{
  padding:18px;
  border-radius:18px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.15);
  text-decoration:none;
  color:white;
  position:relative;
  overflow:hidden;
  transition:0.4s;
  animation:fadeUp 1s ease forwards;
}

.card:nth-child(1){animation-delay:0.3s;}
.card:nth-child(2){animation-delay:0.5s;}

@keyframes fadeUp{
  from{opacity:0; transform:translateY(40px);}
  to{opacity:1; transform:translateY(0);}
}

/* EFECTO BRILLO */
.card::before{
  content:"";
  position:absolute;
  top:0;
  left:-100%;
  width:100%;
  height:100%;
  background:linear-gradient(120deg, transparent, rgba(255,255,255,0.4), transparent);
  transition:0.6s;
}

.card:hover::before{
  left:100%;
}

/* HOVER PRO */
.card:hover{
  transform:translateY(-5px) scale(1.03);
  box-shadow:0 10px 40px rgba(0,0,0,0.6);
}

/* TEXTO */
.card h2{
  margin:0;
  font-size:18px;
  font-weight:500;
}
</style>
</head>

<body>

<!-- VIDEO -->
<div class="video-bg">
  <video autoplay muted loop>
    <source src="video.mp4" type="video/mp4">
  </video>
</div>

<div class="overlay"></div>

<div class="container">
  <div class="logo">Anthony 😏</div>

  <div class="cards">
    <a class="card" href="https://discord.gg/99HWbx9z" target="_blank">
      <h2>💬 Discord</h2>
    </a>

    <a class="card" href="https://tiktok.com/@el_patto.1" target="_blank">
      <h2>🎵 TikTok</h2>
    </a>
  </div>
</div>

</body>
</html>
