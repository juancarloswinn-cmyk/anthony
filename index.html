<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Anthony</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:Arial;
  color:white;
}

/* FONDO CIELO */
.sky{
  position:fixed;
  width:100%;
  height:100%;
  background:url('https://images.unsplash.com/photo-1501785888041-af3ef285b470') center/cover;
  animation:mover 30s linear infinite;
  z-index:-2;
}

/* MOVIMIENTO SUAVE */
@keyframes mover{
  0%{transform:scale(1) translateY(0);}
  50%{transform:scale(1.1) translateY(-20px);}
  100%{transform:scale(1) translateY(0);}
}

/* OVERLAY OSCURO */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
  z-index:-1;
}

/* CONTENIDO */
.container{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  animation:fadeIn 1s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

/* LOGO */
.logo{
  font-size:28px;
  margin-bottom:30px;
  letter-spacing:3px;
  text-shadow:0 0 20px rgba(255,255,255,0.4);
}

/* TARJETAS */
.cards{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
  justify-content:center;
}

.card{
  width:180px;
  padding:20px;
  border-radius:20px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(15px);
  border:1px solid rgba(255,255,255,0.2);
  text-decoration:none;
  color:white;
  transition:0.3s;
  position:relative;
  overflow:hidden;
}

/* BRILLO */
.card::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  top:0;
  left:-100%;
  background:linear-gradient(120deg, transparent, rgba(255,255,255,0.4), transparent);
  transition:0.6s;
}

.card:hover::before{
  left:100%;
}

.card:hover{
  transform:scale(1.08);
  box-shadow:0 0 25px rgba(255,255,255,0.3);
}

/* TEXTO */
.card h2{
  margin:0;
  font-size:18px;
}
</style>
</head>

<body>

<div class="sky"></div>
<div class="overlay"></div>

<div class="container">
  <div class="logo">Anthony</div>

  <div class="cards">
    <a class="card" href="https://discord.gg/99HWbx9z" target="_blank">
      <h2>💬 Discord</h2>
    </a>

    <a class="card" href="https://tiktok.com/@el_patto.1" target="_blank">
      <h2>🎵 TikTok</h2>
    </a>
  </div>
</div>

</body>
</html>
