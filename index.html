<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Anthony</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:Arial;
  color:white;
}

/* VIDEO */
.video-bg{
  position:fixed;
  width:100%;
  height:100%;
  overflow:hidden;
  z-index:-2;
}

.video-bg video{
  width:100%;
  height:100%;
  object-fit:cover;
  animation:zoom 20s infinite alternate;
}

/* ZOOM SUAVE (EFECTO PRO) */
@keyframes zoom{
  from{transform:scale(1);}
  to{transform:scale(1.2);}
}

/* OSCURECER */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  z-index:-1;
}

/* CONTENIDO */
.container{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  animation:fadeIn 1.5s ease;
}

/* ENTRADA */
@keyframes fadeIn{
  from{opacity:0; transform:translateY(40px);}
  to{opacity:1; transform:translateY(0);}
}

/* LOGO */
.logo{
  font-size:32px;
  margin-bottom:40px;
  letter-spacing:4px;
  text-shadow:0 0 25px rgba(255,255,255,0.6);
  animation:float 3s ease-in-out infinite;
}

/* EFECTO FLOTAR */
@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
}

/* TARJETAS */
.cards{
  display:flex;
  gap:25px;
}

/* CARD */
.card{
  width:220px;
  padding:20px;
  border-radius:20px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(15px);
  border:1px solid rgba(255,255,255,0.2);
  text-decoration:none;
  color:white;
  transition:0.3s;
  position:relative;
  overflow:hidden;
  animation:fadeUp 1s ease forwards;
}

/* ENTRADA CARDS */
@keyframes fadeUp{
  from{opacity:0; transform:translateY(50px);}
  to{opacity:1; transform:translateY(0);}
}

.card:nth-child(1){ animation-delay:0.5s; }
.card:nth-child(2){ animation-delay:0.8s; }

/* BRILLO */
.card::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  left:-100%;
  top:0;
  background:linear-gradient(120deg, transparent, rgba(255,255,255,0.4), transparent);
  transition:0.6s;
}

.card:hover::before{
  left:100%;
}

.card:hover{
  transform:scale(1.1);
  box-shadow:0 0 30px rgba(255,255,255,0.4);
}
</style>
</head>

<body>

<!-- VIDEO -->
<div class="video-bg">
  <video autoplay muted loop>
    <source src="video.mp4" type="video/mp4">
  </video>
</div>

<div class="overlay"></div>

<div class="container">
  <div class="logo">Anthony 😏</div>

  <div class="cards">
    <a class="card" href="https://discord.gg/99HWbx9z" target="_blank">
      💬 Discord
    </a>

    <a class="card" href="https://tiktok.com/@el_patto.1" target="_blank">
      🎵 TikTok
    </a>
  </div>
</div>

</body>
</html>
