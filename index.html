<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Anthony 🔥</title>
<style>
body{margin:0;background:black;color:white;font-family:Arial;text-align:center}
#intro{position:fixed;width:100%;height:100%;background:black;display:flex;justify-content:center;align-items:center;font-size:30px;cursor:pointer}
.container{display:none;margin-top:100px}
.btn{display:block;margin:15px auto;padding:12px;width:200px;background:#00ffcc;color:black;border-radius:10px;text-decoration:none}
</style>
</head>

<body>

<div id="intro">💊 CLICK PARA ENTRAR 💊</div>

<div class="container" id="contenido">
<h1>Anthony 😏</h1>
<a class="btn" href="https://discord.gg/99HWbx9z">Discord</a>
<a class="btn" href="https://tiktok.com/@el_patto.1">TikTok</a>
</div>

<audio id="music" loop>
<source src="cancion.mp3" type="audio/mpeg">
</audio>

<script>
document.getElementById("intro").addEventListener("click", function(){
this.style.display="none";
document.getElementById("contenido").style.display="block";
document.getElementById("music").play();
});
</script>

</body>
</html>
